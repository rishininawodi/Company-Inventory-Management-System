<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-box {
            border-radius: 12px;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }

        .sidebar a:hover {
            background: #343a40;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- side bar -->
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">Inventory</h4>
            <hr>

            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="products.html"><i class="bi bi-box"></i> Products</a>
            <a href="add-product.html"><i class="bi bi-plus-circle"></i> Add Product</a>
            <a href="profile.html"><i class="bi bi-person"></i> Profile</a>
            <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <!-- main part -->
        <div class="col-md-10 p-4">

            <!-- Welcome notice -->
            <h3>Welcome, <span id="username"></span> </h3>

            <!-- cards 4 -->
            <div class="row mt-4">

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Total Products</h5>
                        <h3 id="totalProducts">0</h3>
                        <i class="bi bi-box-seam fs-2 text-primary"></i>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Total Stock</h5>
                        <h3 id="totalStock">0</h3>
                        <i class="bi bi-archive fs-2 text-success"></i>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Categories</h5>
                        <h3 id="totalCategories">0</h3>
                        <i class="bi bi-tags fs-2 text-warning"></i>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Users</h5>
                        <h3 id="totalUsers">0</h3>
                        <i class="bi bi-people fs-2 text-danger"></i>
                    </div>
                </div>

            </div>

            <!-- Product table -->
            <div class="mt-5">
                <h4>Recent Products</h4>

                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Category Name</th>
                        </tr>
                    </thead>

                    <tbody id="productTable"></tbody>
                </table>
            </div>

        </div>

    </div>
</div>

<script src="js/theme.js"></script>
<script>

let user = JSON.parse(localStorage.getItem("user"));
if (!user) {
    window.location.href = "login.html";
} else {
    document.getElementById("username").innerText = user.name;
}


// Dashboar data loading for 4 cards
function loadDashboard() {

    fetch("http://localhost/Company-Inventory-Management-System/backend/api/dashboard_stats.php")
    .then(res => {
        if (!res.ok) {
            throw new Error("Failed to load dashboard stats");
        }
        return res.json();
    })
    .then(data => {
        if(data.success){
            document.getElementById("totalProducts").innerText = data.data.total_products || 0;
            document.getElementById("totalStock").innerText = data.data.total_stock || 0;
            document.getElementById("totalCategories").innerText = data.data.total_categories || 0;
            document.getElementById("totalUsers").innerText = data.data.total_users || 0;
        }
    })
    .catch(error => console.error("Error loading dashboard stats:", error));

    fetch("http://localhost/Company-Inventory-Management-System/backend/api/get_products.php?limit=5")
    .then(res => {
        if (!res.ok) {
            throw new Error("Failed to load recent products");
        }
        return res.json();
    })
    .then(data => {
        // Table
        let table = document.getElementById("productTable");
        table.innerHTML = "";

        if(data.data && data.data.length > 0){
            data.data.forEach(p => {
                table.innerHTML += `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.price}</td>
                        <td>${p.stock}</td>
                        <td>${p.category_name || '-'}</td>
                    </tr>
                `;
            });
        } else {
            table.innerHTML = '<tr><td colspan="4" class="text-center">No recent products found.</td></tr>';
        }
    })
    .catch(error => {
        console.error("Error loading recent products:", error);
        let table = document.getElementById("productTable");
        table.innerHTML = '<tr><td colspan="4" class="text-center">Error loading products.</td></tr>';
    });

}

loadDashboard();

// Logout function
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

</script>

</body>
</html>
