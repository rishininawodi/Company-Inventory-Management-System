<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-box {
            border-radius: 12px;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .chart-wrap {
            position: relative;
            height: 320px;
            max-width: 920px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- side bar -->
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">Inventory</h4>
            <hr>

            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="products.html"><i class="bi bi-box"></i> Products</a>
            <a href="add-product.html"><i class="bi bi-plus-circle"></i> Add Product</a>
            <a href="profile.html"><i class="bi bi-person"></i> Profile</a>
            <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <!-- main part -->
        <div class="col-md-10 p-4">

            <!-- Welcome notice -->
            <h3>Welcome, <span id="username"></span> </h3>

            <!-- cards 4 -->
            <div class="row mt-4">

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Total Products</h5>
                        <h3 id="totalProducts">0</h3>
                        <i class="bi bi-box-seam fs-2 text-primary"></i>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Total Stock</h5>
                        <h3 id="totalStock">0</h3>
                        <i class="bi bi-archive fs-2 text-success"></i>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Categories</h5>
                        <h3 id="totalCategories">0</h3>
                        <i class="bi bi-tags fs-2 text-warning"></i>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-box shadow-sm text-center p-3">
                        <h5>Users</h5>
                        <h3 id="totalUsers">0</h3>
                        <i class="bi bi-people fs-2 text-danger"></i>
                    </div>
                </div>

            </div>

            <div class="mt-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="mb-3">Stock by Category</h4>
                        <div class="chart-wrap">
                            <canvas id="categoryStockChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product table -->
            <div class="mt-5">
                <h4>Recent Products</h4>

                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Category Name</th>
                        </tr>
                    </thead>

                    <tbody id="productTable"></tbody>
                </table>
            </div>

        </div>

    </div>
</div>

<script src="js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/logout.js"></script>

</body>
</html>
