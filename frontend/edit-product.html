<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }
        .sidebar a:hover {
            background: #343a40;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">Inventory</h4>
            <hr>
            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="products.html"><i class="bi bi-box"></i> Products</a>
            <a href="#" onclick="logout(event)"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
        <div class="col-md-10 p-4">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit Product</h5>
                    <a href="products.html" class="btn btn-secondary btn-sm">Back</a>
                </div>
                <div class="card-body">
                    <form id="editProductForm">
                        <input type="hidden" id="productId" name="id">

                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Price</label>
                                <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label">Stock</label>
                                <input type="number" min="0" class="form-control" id="stock" name="stock" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="category_name" class="form-label">Category</label>
                            <select class="form-select" id="category_name" name="category_name" required>
                                <option value="">Select category</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Existing Images</label>
                            <div id="existingImages" class="row g-2"></div>
                        </div>

                        <div class="mb-3">
                            <label for="new_images" class="form-label">Add More Images</label>
                            <input type="file" class="form-control" id="new_images" name="new_images" accept="image/*" multiple>
                        </div>

                        <button type="submit" class="btn btn-primary">Update Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/edit-product.js"></script>
<script src="js/logout.js"></script>
</body>
</html>
