<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }
        .sidebar a:hover {
            background: #343a40;
        }
        .sortable:hover {
            cursor: pointer;
            text-decoration: underline;
        }

        @media (max-width: 767.98px) {
            .sidebar {
                height: auto;
                min-height: auto;
            }

            .products-actions {
                text-align: start !important;
            }

            .products-actions .btn,
            .products-actions a.btn {
                width: 100%;
                margin-bottom: 0.5rem;
                margin-left: 0 !important;
                margin-right: 0 !important;
            }

            .products-actions .btn:last-child,
            .products-actions a.btn:last-child {
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- side bar -->
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">Inventory</h4>
            <hr>
            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="products.html"><i class="bi bi-box"></i> Products</a>
            <a href="add-product.html"><i class="bi bi-plus-circle"></i> Add Product</a>
            <a href="profile.html"><i class="bi bi-person"></i> Profile</a>
            <a href="#" onclick="logout(event)"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <!-- body -->
        <div class="col-md-10 p-4">
            <h3>Products</h3>

            <!-- filter and search -->
            <div class="row mb-3">
                <div class="col-12 col-md-4 mb-2 mb-md-0">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by product name...">
                </div>
                <div class="col-12 col-md-3 mb-2 mb-md-0">
                    <select id="categoryFilter" class="form-select">
                        <option value="">All Categories</option>
                    </select>
                </div>
                <div class="col-12 col-md-2 mb-2 mb-md-0 d-grid d-md-block">
                    <button id="filterBtn" class="btn btn-primary w-100 w-md-auto">Filter</button>
                </div>
                <div class="col-12 col-md-3 text-end products-actions">
                    <button id="exportCsvBtn" class="btn btn-outline-secondary me-2"><i class="bi bi-filetype-csv"></i> CSV</button>
                    <button id="exportPdfBtn" class="btn btn-outline-danger me-2"><i class="bi bi-filetype-pdf"></i> PDF</button>
                    <a href="add-product.html" class="btn btn-success ms-1"><i class="bi bi-plus-circle"></i> Add New Product</a>
                </div>
            </div>

            <!-- product list as table -->
            <div class="table-responsive">
                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th class="sortable" data-sort="name">Name <i class="bi bi-arrow-down-up"></i></th>
                            <th class="sortable" data-sort="price">Price <i class="bi bi-arrow-down-up"></i></th>
                            <th class="sortable" data-sort="stock">Stock <i class="bi bi-arrow-down-up"></i></th>
                            <th>Category</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <!-- rows -->
                    </tbody>
                </table>
            </div>

            <!-- PAGINATION -->
            <nav>
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- Pagination links will be inserted here -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="js/products.js"></script>
<script src="js/logout.js"></script>

</body>
</html>
