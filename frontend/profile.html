<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }
        .sidebar a:hover {
            background: #343a40;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #dee2e6;
            background: #fff;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">Inventory</h4>
            <hr>
            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="products.html"><i class="bi bi-box"></i> Products</a>
            <a href="add-product.html"><i class="bi bi-plus-circle"></i> Add Product</a>
            <a href="profile.html"><i class="bi bi-person"></i> Profile</a>
            <a href="#" onclick="logout(event)"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <div class="col-md-10 p-4">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">My Profile</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3 text-center mb-3">
                            <img id="profilePreview" src="https://via.placeholder.com/120?text=User" alt="Profile" class="profile-avatar mb-2">
                            <div class="small text-muted">Profile picture preview</div>
                        </div>
                        <div class="col-md-9">
                            <form id="profileForm" enctype="multipart/form-data">
                                <input type="hidden" id="userId" name="id">

                                <div class="mb-3">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">New Password</label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Leave empty to keep current password">
                                </div>

                                <div class="mb-3">
                                    <label for="profile_image" class="form-label">Profile Picture</label>
                                    <input type="file" class="form-control" id="profile_image" name="profile_image" accept="image/*">
                                </div>

                                <button type="submit" class="btn btn-primary">Update Profile</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/profile.js"></script>
<script src="js/logout.js"></script>
</body>
</html>
