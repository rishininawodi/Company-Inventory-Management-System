<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!--   Boostrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Boostrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 p-3">

<div class="card p-4" style="width: 100%; max-width: 350px;">
    <h4 class="text-center mb-3">Register</h4>

    <input type="text" id="name" class="form-control mb-2" placeholder="Name">
    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100" onclick="register()">Register</button>
</div>

<!--External js files -->

<script src="js/theme.js"></script>
<!--handles API call-->
<script src="js/register.js"></script>

</body>
</html>
