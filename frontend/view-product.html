<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }
        .sidebar a:hover {
            background: #343a40;
        }
        .product-image {
            max-height: 280px;
            object-fit: contain;
            background: #fff;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">Inventory</h4>
            <hr>
            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="products.html"><i class="bi bi-box"></i> Products</a>
            <a href="#" onclick="logout(event)"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Product Details</h3>
                <a href="products.html" class="btn btn-secondary btn-sm">Back</a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-5">
                            <div id="productCarouselWrapper"></div>
                        </div>
                        <div class="col-md-7">
                            <div class="mb-3" id="badgesContainer"></div>
                            <table class="table table-borderless mb-0">
                                <tbody>
                                    <tr>
                                        <th style="width: 180px;">Name</th>
                                        <td id="detailName">-</td>
                                    </tr>
                                    <tr>
                                        <th>Price</th>
                                        <td id="detailPrice">-</td>
                                    </tr>
                                    <tr>
                                        <th>Stock</th>
                                        <td id="detailStock">-</td>
                                    </tr>
                                    <tr>
                                        <th>Category</th>
                                        <td id="detailCategory">-</td>
                                    </tr>
                                    <tr>
                                        <th>Created At</th>
                                        <td id="detailCreatedAt">-</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/view-product.js"></script>
<script src="js/logout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
